name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (dev)
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: License audit (K-1)
        run: uv run python scripts/audit_deps.py
      - name: Tests (pytest, with negative cases)
        run: uv run pytest
      - name: LTR headline (LambdaMART beats fixed fusion, [rank] extra)
        run: uv run --extra dev --extra rank pytest tests/test_reranker.py -k lambdamart -rA
      # golden regression gate runs inside the pytest step above
      # (tests/test_eval_ab_golden.py); it fails on any drift > 1e-9.

  extras:
    # Exercise the optional extras so a missing/renamed dep in an extra cannot ship
    # green (a hidden scikit-learn dep in [rank] slipped through before this job).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Functional smoke — vector + rank (light, no torch)
        run: uv run --extra dev --extra vector --extra rank pytest tests/test_providers.py tests/test_reranker.py -rs
      - name: Import smoke — embed + llm (catches dep-declaration breakage without model downloads)
        run: |
          uv run --extra embed python -c "import recolens.providers.embed_local; print('embed import OK')"
          uv run --extra llm python -c "import recolens.providers.llm_ollama; print('llm import OK')"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan working tree for secrets
        run: gitleaks dir . --redact -v
