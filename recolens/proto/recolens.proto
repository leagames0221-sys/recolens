syntax = "proto3";

// recolens canonical data contract.
// The typed, versioned schema for inter-service communication. The local pipeline
// runs on the zero-dep dataclasses in core/schema.py; proto is the wire-boundary
// schema + codec (recolens/proto/codec.py, optional [proto] extra).
package recolens;

// 投稿コンテンツ(創作物 / 記事)。
message Item {
  string item_id = 1;
  string title = 2;
  string body = 3;
  repeated string tags = 4;
  string author_id = 5;
  int64 created_ts = 6;   // epoch seconds
}

// 読者 / ユーザ。
message User {
  string user_id = 1;
  repeated string interests = 2;
  int64 created_ts = 3;
}

// 行動ログ 1 件(view / read / like 等)。
message Interaction {
  string user_id = 1;
  string item_id = 2;
  string event = 3;
  int64 ts = 4;
  float weight = 5;
}

message ScoredItem {
  string item_id = 1;
  float score = 2;
}

// 推薦 / 検索結果。
message Recommendation {
  string user_id = 1;
  repeated ScoredItem items = 2;
}
